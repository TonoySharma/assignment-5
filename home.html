<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Github Home Page</title>

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
     <!-- tailwind and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">     
       <!--icons  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>
     
</head>
<body class="bg-[#F8FAFC] ">
  <header>
    <div class="mt-5 ml-10 bg-[#FFFFFF] flex justify-between">  
      <div class="flex gap-2 whitespace-nowrap ">
          <img src="./assets/github-logo-2.png" alt="">
          <h1 class="font-semibold text-xl text-[#1F2937]">GitHub Issues Tracker</h1>
      </div>

     <!-- search issue -->
     <div class="join mr-10">
        <div>
            <label class="input validator join-item">
               <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round"
                       stroke-linecap="round"
                       stroke-width="2.5"
                       fill="none"
                       stroke="currentColor">
                       <circle cx="11" cy="11" r="8"></circle>
                       <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="text" placeholder="Search issues..." required />
            </label>
        </div>
        <button class="btn bg-[#1F2937] text-white join-item">+ New Issue</button>
     </div>      
    </div>
  </header>
</body>
</html>
