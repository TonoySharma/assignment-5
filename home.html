<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Github Home Page</title>

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
     <!-- tailwind and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">     
       <!--icons  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>
     
</head>
<body>
  <header class="border-b border-gray-300">
   <section class="py-4 bg-gray-200">
    <div class="ml-10 flex justify-between ">  
      <div class="flex gap-2 whitespace-nowrap items-center">
          <img src="./assets/github-logo-2.png" alt="">
          <h1 class="font-semibold text-xl text-[#1F2937]">GitHub Issues Tracker</h1>
      </div>
     <!-- search issue -->
     <div class="join mr-10">
        <div>
            <label class="input validator join-item">
               <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round"
                       stroke-linecap="round"
                       stroke-width="2.5"
                       fill="none"
                       stroke="currentColor">
                       <circle cx="11" cy="11" r="8"></circle>
                       <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="text" id="searchInput" placeholder="Search issues..." required />
            </label>
        </div>
        <button onclick="searchIssues('searchInput')" class="btn bg-blue-800 text-white join-item">Search</button>
     </div>      
    </div>
   </section>
  </header>
 <!-- main section -->
  <main class="w-[80%] mx-auto mt-10">
    <div class="shadow p-6 rounded-xl ">
      <button onclick="toggleStyles('all-filter-btn')" id="all-filter-btn" class="border border-gray-300 bg-blue-800 text-white p-1 cursor-pointer px-8 rounded hover:shadow-xl transition">All</button>
      <button onclick="toggleStyles('open-filter-btn')" id="open-filter-btn" class="border border-gray-300 bg-gray-200  p-1 cursor-pointer px-8 rounded hover:shadow-xl transition">Open</button>
      <button onclick="toggleStyles('closed-filter-btn')" id="closed-filter-btn" class="border border-gray-300 bg-gray-200 p-1 cursor-pointer px-8 rounded hover:shadow-xl transition">Closed</button>
    </div>
   <section class="mt-5 shadow rounded-xl p-6">

     <div class="flex items-center gap-3">   
       <img src="./assets/Aperture.png" alt="" class="bg-[#ECE4FF] p-3 rounded-full">

       <div class="flex items-center justify-between w-full">

           <div>
             <p class="font-bold">50 Issues</p>
             <p class="text-[#64748B]">Track and manage your project issues</p>
           </div>

          <div class="flex gap-6">
        
            <div class="flex items-center gap-2">
              <span class="h-4 w-4 rounded-full bg-emerald-600"></span>
              <span class="text-lg font-medium text-[#1F2937]">Open</span>
            </div>

            <div class="flex items-center gap-2">
              <span class="h-4 w-4 rounded-full bg-[#A855F7]"></span>
              <span class="text-lg font-medium text-[#1F2937]">Closed</span>
            </div>
          </div>
     </div>

    </div>
   </section>
  </main>
  
  <!-- loading section -->
   <section id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-dots loading-xl"></span>
   </section>

  <!-- cards section -->
 <section id="card-container"  class="w-[80%] mx-auto bg-[#FBFBFB] grid grid-cols-4 gap-5 mt-5 cursor-pointer shadow rounded-xl">
  <div class="bg-white p-5 mb-3 ml-3 shadow-md rounded-xl border-t-4 border-green-500 space-y-4 hover:shadow-xl transition">
    <!-- Top -->
    <div class="flex justify-between items-center">
      <img src="./assets/Open-Status.png" alt="" class="w-8">
      <p class="bg-[#FEECEC] py-1 px-6 rounded-full text-red-500 font-semibold text-sm">
        High
      </p>
    </div>
    <!-- Title -->
    <div class="space-y-1">
      <h1 class="font-bold text-lg">
        Fix navigation menu on mobile devices
      </h1>
      <p class="text-[#64748B] text-sm">
        The navigation menu doesn't collapse<br>properly on mobile devices...
      </p>
    </div>
    <!-- Tags -->
    <div class="flex gap-3">
      <p class="bg-[#FEECEC] border text-[#EF4444] py-1 px-4 rounded-full font-semibold text-sm">
        <i class="fa-solid fa-bug"></i> Bug </p>

      <p class="bg-[#FFF8DB] border text-[#D97706] py-1 px-4 rounded-full font-semibold text-sm">
        <i class="fa-regular fa-life-ring"></i> Help Wanted </p>
    </div>

    <hr class="border-[#E4E4E7]">

    <!-- card footer -->
    <div class="text-sm text-[#64748B]">
      <h2>#1 by john_doe</h2>
      <h2>1/15/2024</h2>
    </div>
  </div>
 </section>

 <!-- modal section -->
  <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  
  <div id="details-container" class="modal-box bg-gray-200 p-4 rounded-xl shadow-xl">
  </div>

  <div class="modal-action">
    <form method="dialog">
      <button class="btn">Close</button>
    </form>
  </div>

</dialog>
  <script src="script/home.js"></script>
</body>
</html>
