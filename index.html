<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
     <!-- tailwind and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">     
       <!--icons  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>   
</head>
<body>
  <!-- sign in section -->
<section class="min-h-screen max-w-md bg-base-200 mx-auto shadow-xl rounded-xl mt-5 mb-5 flex flex-col">

  <div class="logo w-[100px] pt-20 mx-auto mb-8">
    <img src="./assets/github-logo.png" alt="GitHub Logo">
  </div>

  <div class="text-center">
    <h1 class="mb-2 font-bold text-[#1F2937] text-3xl">GitHub Issues Tracker</h1>
    <p class="text-[#64748B]">Sign in to manage your issues</p>
  </div>

  <!-- form -->
  <div class="form pt-5">
    <div class="card w-full max-w-sm mx-auto">
      <div class="card-body">

        <fieldset class="fieldset">

          <label class="label font-bold text-black">Username</label>
          <input id="input-username" type="text" class="input w-full" placeholder="Enter Username"/>

          <label class="label font-bold text-black mt-3">Password</label>
          <input id="input-password" type="password" class="input w-full" placeholder="Enter Password"/>

          <button id="sign-in-btn" class="btn bg-[#1F2937] text-white mt-4 rounded-xl w-full">
            Sign In
          </button>

        </fieldset>

        <div class="flex items-center my-6">
          <div class="flex-grow h-px bg-gray-300"></div>
          <span class="px-4 font-medium text-gray-500">OR</span>
          <div class="flex-grow h-px bg-gray-300"></div>
        </div>

      </div>

      <!-- Demo Credentials -->
      <div class="text-center pb-5">
        <h2 class="text-[#64748B] mb-4">Demo Credentials:</h2>
        <div class="bg-[#e7e9eb] p-4 font-semibold rounded text-sm">
          Username: admin <br>
          Password: admin123
        </div>
      </div>

    </div>
  </div>

</section>
<script src="script/sign-in.js"></script>
</body>
</html>
